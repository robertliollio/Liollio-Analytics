<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liollio Analytics — Euroleague Ratings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #F4F1EA;
    --bg2:     #EDE9DF;
    --bg3:     #E4DFD3;
    --surface: #FDFCF9;
    --border:  #D4CEC4;
    --red:     #D0061F;
    --text:    #18150F;
    --text2:   #56504A;
    --text3:   #9A9490;
    --green:   #0F6130;
    --neg:     #B8051B;
    --font:    'IBM Plex Sans', sans-serif;
    --mono:    'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1500px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; height: 48px; gap: 32px; }
  .brand { font-weight: 600; font-size: 1.1rem; color: var(--red); text-decoration: none; letter-spacing: -0.02em; white-space: nowrap; }
  nav { display: flex; }
  nav a { font-size: 0.82rem; color: var(--text2); text-decoration: none; padding: 0 12px; height: 48px; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: color 0.12s; }
  nav a:hover { color: var(--text); }
  nav a.active { color: var(--red); border-bottom-color: var(--red); font-weight: 500; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .season-sel { font-family: var(--font); font-size: 0.8rem; color: var(--text2); background: var(--bg2); border: 1px solid var(--border); padding: 4px 8px; cursor: pointer; outline: none; }
  .updated-txt { font-size: 0.72rem; color: var(--text3); font-family: var(--mono); }

  /* PAGE */
  .page { max-width: 1500px; margin: 0 auto; padding: 0 20px 48px; }

  /* TITLE STRIP */
  .title-strip { background: var(--bg2); padding: 12px 0 10px; }
  .title-strip h1 { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text2); }
  .title-strip p { font-size: 0.75rem; color: var(--text3); margin-top: 3px; }

  /* CONTROLS */
  .controls { background: var(--bg3); padding: 7px 0; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .ctrl-label { font-size: 0.72rem; color: var(--text3); padding-right: 4px; }
  .tog { font-size: 0.72rem; font-family: var(--font); background: var(--bg2); color: var(--text2); border: 1px solid var(--border); padding: 3px 10px; cursor: pointer; transition: background 0.1s, color 0.1s; }
  .tog.on { background: var(--red); color: #fff; border-color: var(--red); }
  .tog:hover:not(.on) { background: var(--surface); }

  /* TABLE */
  .table-wrap { overflow-x: auto; background: var(--surface); }
  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  thead { position: sticky; top: 48px; z-index: 10; }

  /* group label row */
  .grp-row th { background: var(--bg2); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); padding: 4px 8px; border-bottom: 1px solid var(--border); cursor: default; text-align: center; }
  .grp-row th.meta-grp { text-align: left; }
  .grp-row th.sec { border-left: 2px solid var(--border); }

  /* col header row */
  .col-row { border-bottom: 2px solid var(--border); background: var(--bg3); }
  .col-row th { font-family: var(--mono); font-size: 0.68rem; font-weight: 500; color: var(--text3); text-align: right; padding: 6px 8px; white-space: nowrap; cursor: pointer; user-select: none; border-right: 1px solid var(--border); letter-spacing: 0.02em; }
  .col-row th:hover { color: var(--text); background: var(--bg2); }
  .col-row th.sorted { color: var(--red); background: #F9ECED; }
  .col-row th.sort-desc::after { content: ' ↓'; color: var(--red); }
  .col-row th.sort-asc::after  { content: ' ↑'; color: var(--red); }
  .col-row th.team-h { text-align: left; min-width: 190px; }
  .col-row th.sec { border-left: 2px solid var(--border); }

  tbody tr { border-bottom: 1px solid var(--bg2); transition: background 0.08s; }
  tbody tr:nth-child(even) { background: #FAFAF6; }
  tbody tr:hover { background: #F2EFE7 !important; }

  td { padding: 6px 8px; text-align: right; font-family: var(--mono); font-size: 0.76rem; color: var(--text); white-space: nowrap; border-right: 1px solid var(--bg2); }
  td.rk-col { text-align: center; color: var(--text3); font-size: 0.7rem; width: 32px; }
  td.team-col { text-align: left; font-family: var(--font); font-weight: 500; font-size: 0.82rem; }
  td.team-col a { color: var(--text); text-decoration: none; }
  td.team-col a:hover { color: var(--red); }
  td.sec { border-left: 2px solid var(--border); }
  td.pir { font-weight: 600; }
  .pos { color: var(--green); }
  .neg { color: var(--neg); }

  /* FOOTER */
  footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 12px 20px; }
  .footer-inner { max-width: 1500px; margin: 0 auto; font-size: 0.7rem; color: var(--text3); display: flex; justify-content: space-between; }

  .loading { padding: 60px 20px; text-align: center; font-size: 0.85rem; color: var(--text3); font-family: var(--mono); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="brand" href="index.html">Liollio Analytics</a>
    <nav>
      <a href="index.html" class="active">Ratings</a>
      <a href="standings.html">Standings</a>
      <a href="players.html">Players</a>
    </nav>
    <div class="header-right">
      <select class="season-sel" id="seasonSel" onchange="changeSeason(this.value)"></select>
      <span class="updated-txt" id="updTxt"></span>
    </div>
  </div>
</header>

<div class="page">
  <div class="title-strip">
    <h1>Team Ratings &mdash; <span id="seasonLbl">2025-26</span></h1>
    <p>Click column headers to sort &bull; Click a team name for full team stats</p>
  </div>

  <div class="controls">
    <span class="ctrl-label">Columns:</span>
    <button class="tog on" data-g="efficiency"      onclick="toggleG(this)">Efficiency</button>
    <button class="tog on" data-g="fourfactors"     onclick="toggleG(this)">Four Factors</button>
    <button class="tog on" data-g="basics"          onclick="toggleG(this)">Basics</button>
    <button class="tog on" data-g="characteristics" onclick="toggleG(this)">Characteristics</button>
    <button class="tog on" data-g="pointdist"       onclick="toggleG(this)">Point Distribution</button>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loading">Loading data...</div>
    <table id="tbl" style="display:none">
      <thead>
        <tr class="grp-row" id="grpRow"></tr>
        <tr class="col-row" id="colRow"></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <span>Liollio Analytics &mdash; Euroleague Basketball</span>
    <span>Data via Euroleague API</span>
  </div>
</footer>

<script>
const COLS = [
  { key:'rk',            lbl:'RK',      grp:'meta',            fmt:'int',  cls:'rk-col' },
  { key:'team',          lbl:'Team',    grp:'meta',            fmt:'team', cls:'team-col' },
  { key:'gp',            lbl:'GP',      grp:'meta',            fmt:'int'  },
  { key:'pir',           lbl:'PIR',     grp:'meta',            fmt:'f1',   cls:'pir', tip:'Performance Index Rating per game' },

  { key:'o_eff',         lbl:'O Eff',   grp:'efficiency',      fmt:'f2',   tip:'Points scored per 100 offensive possessions' },
  { key:'d_eff',         lbl:'D Eff',   grp:'efficiency',      fmt:'f2',   tip:'Points allowed per 100 defensive possessions' },
  { key:'net_rtg',       lbl:'Net',     grp:'efficiency',      fmt:'f2',   signed:true, tip:'Offensive minus defensive efficiency' },
  { key:'tempo',         lbl:'Tempo',   grp:'efficiency',      fmt:'f1',   tip:'Defensive possessions per game' },

  { key:'o_efg',         lbl:'O eFG%',  grp:'fourfactors',     fmt:'f1',   tip:'Effective field goal % (offense)' },
  { key:'d_efg',         lbl:'D eFG%',  grp:'fourfactors',     fmt:'f1',   tip:'Effective field goal % allowed' },
  { key:'o_tov_pct',     lbl:'O TO%',   grp:'fourfactors',     fmt:'f1',   tip:'Turnover % (offense)' },
  { key:'d_tov_pct',     lbl:'D TO%',   grp:'fourfactors',     fmt:'f1',   tip:'Turnover % forced' },
  { key:'o_oreb_pct',    lbl:'O OR%',   grp:'fourfactors',     fmt:'f1',   tip:'Offensive rebound %' },
  { key:'d_oreb_pct',    lbl:'D OR%',   grp:'fourfactors',     fmt:'f1',   tip:'Opponent offensive rebound % allowed' },
  { key:'o_fta_fga',     lbl:'O FT/FG', grp:'fourfactors',     fmt:'f2',   tip:'FT attempts per FG attempt (offense)' },
  { key:'d_fta_fga',     lbl:'D FT/FG', grp:'fourfactors',     fmt:'f2',   tip:'Opponent FT rate (defense)' },

  { key:'o_3p_pct',      lbl:'O 3P%',   grp:'basics',          fmt:'f1',   tip:'3-point % (offense)' },
  { key:'d_3p_pct',      lbl:'D 3P%',   grp:'basics',          fmt:'f1',   tip:'3-point % allowed' },
  { key:'o_2p_pct',      lbl:'O 2P%',   grp:'basics',          fmt:'f1',   tip:'2-point % (offense)' },
  { key:'d_2p_pct',      lbl:'D 2P%',   grp:'basics',          fmt:'f1',   tip:'2-point % allowed' },
  { key:'o_ft_pct',      lbl:'O FT%',   grp:'basics',          fmt:'f1',   tip:'Free throw % (offense)' },
  { key:'d_ft_pct',      lbl:'D FT%',   grp:'basics',          fmt:'f1',   tip:'Opponent free throw %' },
  { key:'o_blk_pct',     lbl:'O Blk%',  grp:'basics',          fmt:'f1',   tip:'Block % (our blocks / opp FGA)' },
  { key:'d_blk_pct',     lbl:'D Blk%',  grp:'basics',          fmt:'f1',   tip:'Shots blocked / our FGA' },
  { key:'o_stl_pct',     lbl:'O Stl%',  grp:'basics',          fmt:'f1',   tip:'Steal % (steals / def possessions)' },
  { key:'d_stl_pct',     lbl:'D Stl%',  grp:'basics',          fmt:'f1',   tip:'Opponent steal % vs us' },
  { key:'o_nstov_pct',   lbl:'O NST%',  grp:'basics',          fmt:'f1',   tip:'Non-steal turnover % (offense)' },
  { key:'d_nstov_pct',   lbl:'D NST%',  grp:'basics',          fmt:'f1',   tip:'Non-steal turnover % forced' },

  { key:'o_3pa_fga',     lbl:'O 3PA%',  grp:'characteristics', fmt:'f1',   tip:'3-point attempt rate (offense)' },
  { key:'d_3pa_fga',     lbl:'D 3PA%',  grp:'characteristics', fmt:'f1',   tip:'Opponent 3-point attempt rate' },
  { key:'o_ast_fgm',     lbl:'O Ast%',  grp:'characteristics', fmt:'f1',   tip:'Assists per FGM (offense)' },
  { key:'d_ast_fgm',     lbl:'D Ast%',  grp:'characteristics', fmt:'f1',   tip:'Opponent assists per FGM' },

  { key:'o_pts_3_pct',   lbl:'O 3pt%',  grp:'pointdist',       fmt:'f1',   tip:'% points from 3-pointers (offense)' },
  { key:'d_pts_3_pct',   lbl:'D 3pt%',  grp:'pointdist',       fmt:'f1',   tip:'% opp points from 3-pointers' },
  { key:'o_pts_2_pct',   lbl:'O 2pt%',  grp:'pointdist',       fmt:'f1',   tip:'% points from 2-pointers (offense)' },
  { key:'d_pts_2_pct',   lbl:'D 2pt%',  grp:'pointdist',       fmt:'f1',   tip:'% opp points from 2-pointers' },
  { key:'o_pts_ft_pct',  lbl:'O FT%',   grp:'pointdist',       fmt:'f1',   tip:'% points from free throws (offense)' },
  { key:'d_pts_ft_pct',  lbl:'D FT%',   grp:'pointdist',       fmt:'f1',   tip:'% opp points from free throws' },
];

const GRP_LABELS = {
  meta:'', efficiency:'Efficiency', fourfactors:'Four Factors',
  basics:'Basics', characteristics:'Characteristics', pointdist:'Point Distribution'
};

let teams = [], sortKey = 'pir', sortDir = -1;
let vis = { efficiency:true, fourfactors:true, basics:true, characteristics:true, pointdist:true };
let season = '2025';

async function init() {
  await loadSeasons();
  await loadData(season);
}

async function loadSeasons() {
  try {
    const d = await (await fetch('data/seasons.json')).json();
    const sel = document.getElementById('seasonSel');
    d.seasons.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = d.season_labels[s] || s;
      if (String(s) === String(d.current_season)) { o.selected = true; season = String(s); }
      sel.appendChild(o);
    });
  } catch(e) {}
}

async function loadData(s) {
  try {
    const d = await (await fetch(`data/${s}/teams.json`)).json();
    teams = d.teams || [];
    document.getElementById('seasonLbl').textContent = d.season_label || s;
    if (d.updated) {
      const dt = new Date(d.updated);
      document.getElementById('updTxt').textContent = 'Updated ' +
        dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
        dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    }
    render();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('tbl').style.display = '';
  } catch(e) {
    document.getElementById('loading').textContent = 'No data found. Run pipeline.py first.';
  }
}

function changeSeason(v) {
  season = v;
  document.getElementById('loading').style.display = '';
  document.getElementById('tbl').style.display = 'none';
  loadData(v);
}

function toggleG(btn) {
  const g = btn.dataset.g;
  vis[g] = !vis[g];
  btn.classList.toggle('on', vis[g]);
  render();
}

function visCols() {
  return COLS.filter(c => c.grp === 'meta' || vis[c.grp]);
}

function render() {
  renderHeader();
  renderBody();
}

function renderHeader() {
  const cols = visCols();
  const grpRow = document.getElementById('grpRow');
  const colRow = document.getElementById('colRow');
  grpRow.innerHTML = ''; colRow.innerHTML = '';

  // Group spans
  let spans = [], last = null, span = 0;
  cols.forEach((c, i) => {
    if (c.grp !== last) { if (last) spans.push({g:last,n:span}); last=c.grp; span=1; }
    else span++;
    if (i===cols.length-1) spans.push({g:last,n:span});
  });
  spans.forEach((s,i) => {
    const th = document.createElement('th');
    th.colSpan = s.n; th.textContent = GRP_LABELS[s.g]||'';
    if (s.g==='meta') th.classList.add('meta-grp');
    if (i>0 && s.g!=='meta') th.classList.add('sec');
    grpRow.appendChild(th);
  });

  // Col headers
  let seen = {};
  cols.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c.lbl;
    if (c.tip) th.title = c.tip;
    if (c.grp==='meta' && c.key==='team') th.classList.add('team-h');
    if (c.grp!=='meta' && !seen[c.grp]) { th.classList.add('sec'); seen[c.grp]=true; }
    if (c.key===sortKey) { th.classList.add('sorted'); th.classList.add(sortDir===-1?'sort-desc':'sort-asc'); }
    if (c.key!=='rk') th.addEventListener('click', ()=>sortBy(c.key));
    colRow.appendChild(th);
  });
}

function renderBody() {
  const cols = visCols();
  const sorted = [...teams].sort((a,b) => {
    const av = a[sortKey]??-Infinity, bv = b[sortKey]??-Infinity;
    return sortDir*(bv-av);
  });
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  sorted.forEach((t,i) => {
    const tr = document.createElement('tr');
    let seen = {};
    cols.forEach(c => {
      const td = document.createElement('td');
      if (c.cls) td.classList.add(c.cls);
      if (c.grp!=='meta' && !seen[c.grp]) { td.classList.add('sec'); seen[c.grp]=true; }

      if (c.key==='rk') { td.textContent = i+1; }
      else if (c.key==='team') {
        const a = document.createElement('a');
        a.href = `team.html?team=${encodeURIComponent(t.team)}`;
        a.textContent = t.team; td.appendChild(a);
      } else {
        const v = t[c.key];
        if (v==null) { td.textContent='—'; td.style.color='var(--text3)'; }
        else {
          td.textContent = fmt(v, c.fmt, c.signed);
          if (c.key==='net_rtg') td.classList.add(v>0?'pos':'neg');
        }
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function fmt(v, f, signed) {
  const s = (signed && v>0) ? '+' : '';
  if (f==='int')  return Math.round(v);
  if (f==='f1')   return s + v.toFixed(1);
  if (f==='f2')   return s + v.toFixed(2);
  return v;
}

function sortBy(k) {
  sortDir = (sortKey===k) ? sortDir*-1 : -1;
  sortKey = k;
  render();
}

init();
</script>
</body>
</html>
